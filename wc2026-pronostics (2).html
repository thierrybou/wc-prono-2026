<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>⚽ WC 2026 Pronostics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#C9A227;--gl:#E8C84A;--gd:#9A7A18;
  --r:#E74C3C;--gr:#27AE60;--grl:#4fc87e;
  --n:#0A1628;--nm:#132240;--ns:#1E3A5F;
  --t1:#F0EDE6;--t2:#8B9BB4;--t3:#5A6880;
  --b1:rgba(201,162,39,.2);--b2:rgba(255,255,255,.08);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--n);color:var(--t1);min-height:100vh;font-size:14px;padding-bottom:48px}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
select,input{font-family:inherit}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{animation:pulse 2s infinite}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--n)}
::-webkit-scrollbar-thumb{background:var(--ns);border-radius:2px}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#0A1628,#1E3A5F,#132240);border-bottom:2px solid var(--g);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.6);flex-wrap:wrap}
.hdr-brand{display:flex;align-items:center;gap:9px}
.hdr-logo{font-size:24px;filter:drop-shadow(0 0 8px rgba(201,162,39,.7))}
.hdr-h1{font-family:Georgia,serif;font-size:17px;font-weight:700;color:var(--gl);line-height:1}
.hdr-sub{font-size:9px;color:var(--t2);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.hdr-acts{display:flex;align-items:center;gap:5px;flex-wrap:wrap}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap;cursor:pointer;line-height:1}
.btn-gold{background:linear-gradient(135deg,var(--g),var(--gl));color:var(--n)}
.btn-gold:hover{filter:brightness(1.08)}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--t1);border:1px solid var(--b2)}
.btn-ghost:hover{border-color:var(--g);color:var(--g)}
.btn-green{background:rgba(39,174,96,.12);color:var(--grl);border:1px solid rgba(39,174,96,.3)}
.btn-green:hover{background:rgba(39,174,96,.2)}
.btn-blue{background:rgba(52,152,219,.12);color:#5DADE2;border:1px solid rgba(52,152,219,.3)}
.btn-red{background:rgba(231,76,60,.12);color:var(--r);border:1px solid rgba(231,76,60,.3)}
.btn-sm{padding:4px 9px;font-size:11px}

/* ── LAYOUT ── */
.main{max-width:900px;margin:0 auto;padding:12px 12px}

/* ── SETUP ── */
.setup-wrap{max-width:420px;margin:28px auto}
.card{background:var(--nm);border:1px solid var(--b1);border-radius:16px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.info{background:rgba(201,162,39,.07);border:1px solid rgba(201,162,39,.2);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--t2);margin-bottom:14px;line-height:1.7}
.fl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);margin-bottom:5px;display:block}
.fi{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--b2);border-radius:8px;padding:9px 12px;font-size:14px;font-weight:700;color:var(--t1);outline:none;margin-bottom:12px}
.fi:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(201,162,39,.12)}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.role-btn{border-radius:12px;padding:14px 8px;cursor:pointer;text-align:center;transition:all .15s;color:var(--t1);font-size:12px}

/* ── STATUS BAR ── */
.status-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px;margin-bottom:10px;font-size:11px;flex-wrap:wrap}
.status-bar.syncing{background:rgba(201,162,39,.07);border:1px solid var(--b1);color:var(--gl)}
.status-bar.ok{background:rgba(39,174,96,.07);border:1px solid rgba(39,174,96,.2);color:var(--grl)}
.status-bar.err{background:rgba(231,76,60,.07);border:1px solid rgba(231,76,60,.2);color:var(--r)}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── DASHBOARD ── */
.dash{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.dash-card{background:var(--nm);border:1px solid var(--b2);border-radius:14px;padding:14px;animation:fadeIn .3s ease}
.dash-name{font-size:15px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.dash-pts{font-family:Georgia,serif;font-size:42px;line-height:1;margin:3px 0}
.dash-stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:5px}
.dash-sn{font-size:14px;font-weight:700}
.dash-sl{font-size:10px;color:var(--t2)}
.badge{font-size:9px;padding:2px 6px;border-radius:99px;background:rgba(201,162,39,.18);color:var(--gl)}

/* ── ROUNDS TABS ── */
.rtabs{display:flex;gap:3px;background:var(--nm);border:1px solid var(--b1);border-radius:13px;padding:4px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none}
.rtabs::-webkit-scrollbar{display:none}
.rtab{flex:1;min-width:50px;padding:7px 6px;border-radius:8px;font-size:11px;font-weight:700;text-align:center;white-space:nowrap;background:none;color:var(--t2);cursor:pointer;transition:all .15s}
.rtab.on{background:linear-gradient(135deg,var(--gd),var(--g));color:var(--n)}
.rtab-i{display:block;font-size:13px;margin-bottom:1px}
.rtab-t{display:block;font-size:9px}

/* ── SECTION HEADER ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.sec-title{font-family:Georgia,serif;font-size:17px;font-weight:700;color:var(--gl)}
.search{background:rgba(255,255,255,.07);border:1px solid var(--b2);border-radius:7px;padding:6px 10px;font-size:12px;color:var(--t1);outline:none;width:150px;transition:width .2s}
.search:focus{border-color:var(--g);width:180px}

/* ── MATCH CARD ── */
.mc{background:var(--nm);border-radius:13px;overflow:hidden;margin-bottom:9px;border:1px solid var(--b2);animation:fadeIn .2s ease}
.mc.done{border-left:3px solid var(--grl)}
.mc.prono{border-left:3px solid var(--g)}
.mc-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--ns);border-bottom:1px solid var(--b2);flex-wrap:wrap;gap:2px}
.mc-num{font-size:10px;font-weight:700;color:var(--g);letter-spacing:.5px}
.mc-info{font-size:10px;color:var(--t3)}
.mc-st{font-size:9px;padding:2px 7px;border-radius:99px;font-weight:700}
.mc-body{padding:12px}

/* ── TEAMS ROW ── */
.trow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;margin-bottom:12px}
.tl{display:flex;align-items:center;gap:6px}
.tr{display:flex;align-items:center;gap:6px;flex-direction:row-reverse;text-align:right}
.tf{font-size:22px;line-height:1;flex-shrink:0}
.tn{font-size:13px;font-weight:700;line-height:1.2}
.vs{font-size:14px;font-weight:700;color:var(--t3)}

/* ── PRONO BLOCKS ── */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pb{background:var(--ns);border-radius:9px;padding:10px}
.pt{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;flex-wrap:wrap;gap:2px;min-height:20px}
.pn{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)}
.ptb{font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px}
.sr{display:flex;align-items:center;gap:5px;margin-bottom:7px}
.si{width:44px;height:42px;background:rgba(255,255,255,.07);border:1.5px solid var(--b2);border-radius:8px;text-align:center;font-size:19px;font-weight:700;font-family:monospace;color:var(--t1);outline:none;transition:border-color .15s}
.si:focus{border-color:var(--g);box-shadow:0 0 0 2px rgba(201,162,39,.12)}
.si:disabled{opacity:.35;cursor:not-allowed}
.ss{font-size:17px;font-weight:700;color:var(--t3)}
.ql{font-size:9px;color:var(--t2);margin-bottom:4px;display:block}
.qo{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.qb{padding:5px 3px;border-radius:6px;font-size:10px;font-weight:600;line-height:1.3;cursor:pointer;transition:all .12s}
.qb:disabled{opacity:.3;cursor:not-allowed}

/* ── OFFICIAL SCORE ── */
.os{padding-top:10px;border-top:1px solid var(--b2)}
.ol{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--grl);margin-bottom:7px}
.or{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.oi{width:44px;height:36px;background:rgba(39,174,96,.1);border:1.5px solid rgba(39,174,96,.35);border-radius:8px;text-align:center;font-size:17px;font-weight:700;font-family:monospace;color:var(--grl);outline:none}
.oi:focus{border-color:var(--grl)}
.oi.auto{background:rgba(82,213,126,.15);border-color:rgba(82,213,126,.5)}
.oqr{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.oqb{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer}

/* ── MISC ── */
.leg{display:flex;gap:12px;flex-wrap:wrap;font-size:10px;color:var(--t3);margin-top:10px}
.empty{text-align:center;padding:2rem;color:var(--t3)}
.tz{position:fixed;bottom:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:var(--ns);border:1px solid var(--b1);border-radius:9px;padding:9px 14px;font-size:12px;font-weight:600;max-width:260px;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:fadeIn .25s ease;pointer-events:auto}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--nm);border:1px solid var(--b1);border-radius:16px;padding:20px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto}
.modal h2{font-family:Georgia,serif;font-size:17px;color:var(--gl);margin-bottom:12px}
.code-box{background:rgba(0,0,0,.5);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;font-family:monospace;font-size:10px;color:var(--grl);word-break:break-all;line-height:1.6;margin:8px 0;cursor:pointer;user-select:all}
.ta{width:100%;background:rgba(0,0,0,.4);border:1px solid var(--b2);border-radius:8px;padding:8px;font-family:monospace;font-size:10px;color:var(--grl);resize:vertical;min-height:80px;outline:none}
.ta:focus{border-color:var(--g)}

@media(max-width:520px){
  .dash{grid-template-columns:1fr}
  .pg{grid-template-columns:1fr}
  .si{width:40px;height:38px;font-size:16px}
  .dash-pts{font-size:36px}
  .role-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <span class="hdr-logo">⚽</span>
    <div>
      <div class="hdr-h1">WC 2026 Pronostics</div>
      <div class="hdr-sub">🇺🇸 USA · 🇨🇦 Canada · 🇲🇽 Mexique</div>
    </div>
  </div>
  <div class="hdr-acts" id="hdrActs"></div>
</header>

<div class="main" id="app"></div>
<div class="tz" id="tz"></div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <div id="modalBody"></div>
    <div style="display:flex;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-ghost" onclick="closeModal()">Fermer</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const JSONBIN_KEY = '$2a$10$3vniEdGF809raIz9sMw2nOz3/DJk5aUiXxoZhhGSWZXI9yV8giB.u';
const JSONBIN_URL = 'https://api.jsonbin.io/v3';
const SCORES_URL  = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
const LS_KEY      = 'wc26_v3';
const POLL_MS     = 6000;   // poll JSONBin toutes les 6s
const SCORES_MS   = 60000;  // scores API toutes les 60s
const FETCH_TO    = 5000;   // timeout réseau 5s

// ══════════════════════════════════════════════════════════════
// DONNÉES MATCHS (validées contre API openfootball)
// ══════════════════════════════════════════════════════════════
const FLAGS = {
  'South Africa':'🇿🇦','Canada':'🇨🇦','Germany':'🇩🇪','Paraguay':'🇵🇾',
  'Netherlands':'🇳🇱','Morocco':'🇲🇦','Brazil':'🇧🇷','Japan':'🇯🇵',
  'France':'🇫🇷','Sweden':'🇸🇪','Ivory Coast':'🇨🇮','Norway':'🇳🇴',
  'Mexico':'🇲🇽','Ecuador':'🇪🇨','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','DR Congo':'🇨🇩',
  'USA':'🇺🇸','Bosnia & Herzegovina':'🇧🇦','Belgium':'🇧🇪','Senegal':'🇸🇳',
  'Portugal':'🇵🇹','Croatia':'🇭🇷','Spain':'🇪🇸','Austria':'🇦🇹',
  'Switzerland':'🇨🇭','Algeria':'🇩🇿','Argentina':'🇦🇷','Cape Verde':'🇨🇻',
  'Colombia':'🇨🇴','Ghana':'🇬🇭','Australia':'🇦🇺','Egypt':'🇪🇬',
  'Vainqueur 16e':'🏳️','Vainqueur 8e':'🏳️','Vainqueur QF':'🏳️','Vainqueur SF':'🏳️',
};
const gf = n => FLAGS[n] || '🏳️';
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const ROUNDS = [
  {id:'r32',name:'16èmes de finale',s:'16e',i:'🏟️'},
  {id:'r16',name:'8èmes de finale', s:'8e', i:'⚔️'},
  {id:'qf', name:'Quarts de finale',s:'QF', i:'🏆'},
  {id:'sf', name:'Demi-finales',    s:'SF', i:'⭐'},
  {id:'fin',name:'Finale',          s:'F',  i:'🌟'},
];

// IDs stables = noms des équipes de l'API openfootball (validés)
const MATCHES = {
  r32:[
    {id:'r32_1', n:'Match 65',h:'South Africa',      a:'Canada',               d:'28/06 21h'},
    {id:'r32_2', n:'Match 66',h:'Germany',            a:'Paraguay',             d:'29/06 19h'},
    {id:'r32_3', n:'Match 67',h:'Netherlands',        a:'Morocco',              d:'29/06 22h'},
    {id:'r32_4', n:'Match 68',h:'Brazil',             a:'Japan',                d:'29/06 19h'},
    {id:'r32_5', n:'Match 69',h:'France',             a:'Sweden',               d:'30/06 23h'},
    {id:'r32_6', n:'Match 70',h:'Ivory Coast',        a:'Norway',               d:'30/06 19h'},
    {id:'r32_7', n:'Match 71',h:'Mexico',             a:'Ecuador',              d:'01/07 02h'},
    {id:'r32_8', n:'Match 72',h:'England',            a:'DR Congo',             d:'01/07 01h'},
    {id:'r32_9', n:'Match 73',h:'USA',                a:'Bosnia & Herzegovina', d:'01/07 23h'},
    {id:'r32_10',n:'Match 74',h:'Belgium',            a:'Senegal',              d:'01/07 19h'},
    {id:'r32_11',n:'Match 75',h:'Portugal',           a:'Croatia',              d:'02/07 19h'},
    {id:'r32_12',n:'Match 76',h:'Spain',              a:'Austria',              d:'02/07 23h'},
    {id:'r32_13',n:'Match 77',h:'Switzerland',        a:'Algeria',              d:'02/07 23h'},
    {id:'r32_14',n:'Match 78',h:'Argentina',          a:'Cape Verde',           d:'03/07 23h'},
    {id:'r32_15',n:'Match 79',h:'Colombia',           a:'Ghana',                d:'03/07 19h'},
    {id:'r32_16',n:'Match 80',h:'Australia',          a:'Egypt',                d:'03/07 01h'},
  ],
  r16:  [1,2,3,4,5,6,7,8].map(i=>({id:`r16_${i}`, n:`8e — M${80+i}`,  h:'Vainqueur 16e',a:'Vainqueur 16e',d:'04-07/07'})),
  qf:   [1,2,3,4].map(i=>        ({id:`qf_${i}`,  n:`Quart ${i}`,      h:'Vainqueur 8e', a:'Vainqueur 8e', d:'10-12/07'})),
  sf:   [1,2].map(i=>             ({id:`sf_${i}`,  n:`Demi ${i}`,       h:'Vainqueur QF', a:'Vainqueur QF', d:'14-15/07'})),
  fin:  [{id:'fin_1',             n:'FINALE',       h:'Vainqueur SF',    a:'Vainqueur SF', d:'19/07'}],
};
const ALL_M = () => Object.values(MATCHES).flat();

// ══════════════════════════════════════════════════════════════
// STATE — localStorage est la source de vérité immédiate
// ══════════════════════════════════════════════════════════════
let S = {
  player: 'p1',
  name: '',
  binId: null,
  players: {p1: 'Joueur 1', p2: 'Joueur 2'},
  pronostics: {},  // {matchId: {p1: {home,away,q}, p2: {home,away,q}}}
  official: {},    // {matchId: {home,away,q,_auto,_ts}}
  _ts: 0,
};
let ROUND = 'r32', SEARCH = '', INITED = false;
let pollTimer = null, scoresTimer = null, syncStatus = 'idle';
let lastSyncTime = null, lastBinTs = 0;

function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(S)); } catch(e) {}
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
    if (d && d.name) { S = {...S, ...d}; return true; }
  } catch(e) {}
  return false;
}

// ══════════════════════════════════════════════════════════════
// RÉSEAU — avec timeout strict, jamais bloquant
// ══════════════════════════════════════════════════════════════
async function fetchTO(url, opts = {}, ms = FETCH_TO) {
  const ac = new AbortController();
  const id = setTimeout(() => ac.abort(), ms);
  try {
    const r = await fetch(url, {...opts, signal: ac.signal});
    clearTimeout(id);
    return r;
  } catch(e) {
    clearTimeout(id);
    throw e;
  }
}

// ── JSONBin ──
async function binCreate(data) {
  const r = await fetchTO(`${JSONBIN_URL}/b`, {
    method: 'POST',
    headers: {'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Private':'false'},
    body: JSON.stringify(data)
  }, 8000);
  const j = await r.json();
  if (!r.ok) throw new Error(j.message || 'Erreur création');
  return j.metadata.id;
}

async function binRead(id) {
  try {
    const r = await fetchTO(`${JSONBIN_URL}/b/${id}/latest`, {
      headers: {'X-Master-Key': JSONBIN_KEY, 'X-Bin-Meta': 'false'}
    });
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

async function binPut(id, data) {
  try {
    const r = await fetchTO(`${JSONBIN_URL}/b/${id}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
      body: JSON.stringify(data)
    });
    return r.ok;
  } catch(e) { return false; }
}

// ── SYNC LOGIC ──
// Payload envoyé au bin: state partagé entre les 2 joueurs
function makeBinPayload() {
  return {
    players: S.players,
    pronostics: S.pronostics,
    official: S.official,
    _ts: Date.now(),
  };
}

// Merge distant -> local. Retourne true si changements.
function mergeRemote(remote) {
  if (!remote || !remote._ts || remote._ts <= lastBinTs) return false;
  let changed = false;
  // Players
  for (const [pid, name] of Object.entries(remote.players || {})) {
    if (name && name !== S.players[pid]) { S.players[pid] = name; changed = true; }
  }
  // Pronostics: ne jamais écraser ses propres pronostics
  for (const [mid, pronos] of Object.entries(remote.pronostics || {})) {
    if (!S.pronostics[mid]) S.pronostics[mid] = {};
    for (const [pid, prono] of Object.entries(pronos)) {
      if (pid !== S.player) {
        const cur = JSON.stringify(S.pronostics[mid][pid]);
        const nxt = JSON.stringify(prono);
        if (cur !== nxt) { S.pronostics[mid][pid] = prono; changed = true; }
      }
    }
  }
  // Official: last-write-wins
  for (const [mid, off] of Object.entries(remote.official || {})) {
    const cur = S.official[mid];
    if (!cur || (off._ts || 0) > (cur._ts || 0)) {
      S.official[mid] = off; changed = true;
    }
  }
  lastBinTs = remote._ts;
  if (changed) setTimeout(updateDash, 0);
  return changed;
}

// Push local -> bin (après chaque modification)
let pushDebounce = null;
function pushToBin() {
  if (!S.binId) return;
  clearTimeout(pushDebounce);
  pushDebounce = setTimeout(async () => {
    const payload = makeBinPayload();
    lastBinTs = payload._ts;
    S._ts = payload._ts;
    const ok = await binPut(S.binId, payload);
    if (!ok) toast('Erreur sauvegarde réseau', 'err');
  }, 300);
}

// Poll bin -> afficher changements
async function pollBin() {
  if (!S.binId) return;
  setSyncStatus('syncing');
  const remote = await binRead(S.binId);
  if (remote) {
    const changed = mergeRemote(remote);
    if (changed) { save(); renderMain(); }
    lastSyncTime = new Date();
    setSyncStatus('ok');
  } else {
    setSyncStatus('err');
  }
}

function startPolling() {
  stopPolling();
  pollTimer = setInterval(pollBin, POLL_MS);
}
function stopPolling() {
  clearInterval(pollTimer);
  clearInterval(scoresTimer);
}

function setSyncStatus(s) {
  syncStatus = s;
  const bar = document.getElementById('syncBar');
  if (!bar) return;
  const dot = bar.querySelector('.status-dot');
  const txt = bar.querySelector('.sync-txt');
  if (s === 'ok') {
    bar.className = 'status-bar ok';
    if (dot) dot.style.background = 'var(--grl)';
    if (txt) txt.textContent = `Sync ${lastSyncTime ? lastSyncTime.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : ''}`;
  } else if (s === 'syncing') {
    bar.className = 'status-bar syncing';
    if (dot) { dot.style.background = 'var(--gl)'; dot.classList.add('pulse'); }
    if (txt) txt.textContent = 'Synchronisation...';
  } else {
    bar.className = 'status-bar err';
    if (dot) dot.style.background = 'var(--r)';
    if (txt) txt.textContent = 'Hors ligne — données locales';
  }
}

// SCORES OFFICIELS — API openfootball (raw.githubusercontent.com)
// ══════════════════════════════════════════════════════════════
// Mapping noms openfootball -> noms dans nos matchs
const API_NAME_MAP = {
  'Bosnia & Herzegovina': 'Bosnia & Herzegovina',
  'DR Congo':             'DR Congo',
  'Cape Verde':           'Cape Verde',
  'Ivory Coast':          'Ivory Coast',
  'USA':                  'USA',
  'South Africa':         'South Africa',
};
const apiN = n => API_NAME_MAP[n] || n;

async function fetchScores() {
  try {
    const r = await fetchTO(SCORES_URL, {cache: 'no-store'}, 8000);
    if (!r.ok) return;
    const data = await r.json();
    const matches = data.matches || [];
    const KO_ROUNDS = ['Round of 32','Round of 16','Quarter-final','Semi-final','Final'];
    let updated = false;

    matches.filter(m => KO_ROUNDS.includes(m.round)).forEach(m => {
      const ft = m.score?.ft;
      if (!ft) return;
      const hName = apiN(m.team1);
      const aName = apiN(m.team2);
      // Trouver le match dans nos données
      const found = ALL_M().find(mx =>
        mx.h === hName && mx.a === aName ||
        mx.h === aName && mx.a === hName  // ou inversé
      );
      if (!found) return;
      const [home, away] = found.h === hName ? ft : [ft[1], ft[0]];
      const existing = S.official[found.id];
      const newTs = Date.now();
      if (!existing || !existing._auto ||
          existing.home !== home || existing.away !== away) {
        S.official[found.id] = {home, away, q: existing?.q ?? null, _auto: true, _ts: newTs};
        updated = true;
      }
    });

    if (updated) {
      save();
      if (S.binId) pushToBin();
      // Re-render complet pour mettre à jour les cartes ET le dashboard
      if (INITED) renderMain();
      toast('Scores officiels mis à jour 🤖', 'ok');
    }
  } catch(e) {
    console.warn('Scores fetch error:', e);
  }
}

function startScoresFetch() {
  fetchScores();
  scoresTimer = setInterval(fetchScores, SCORES_MS);
}

// ══════════════════════════════════════════════════════════════
// CALCUL POINTS
// ══════════════════════════════════════════════════════════════
function calcPts(prono, off) {
  if (!prono || off?.home === undefined || off?.home === '' || off?.home === null) return null;
  if (prono.home === undefined || prono.home === '' || prono.home === null) return null;
  const [pH, pA, oH, oA] = [prono.home, prono.away, off.home, off.away].map(Number);
  if ([pH,pA,oH,oA].some(isNaN)) return null;
  const pq = prono.q || null; // vainqueur TAB pronostiqué (nom équipe)
  const oq = off.q   || null; // vainqueur TAB officiel   (nom équipe)

  // Vainqueur au temps réglementaire
  const offW90 = oH > oA ? 'home' : oA > oH ? 'away' : 'draw';
  const proW90 = pH > pA ? 'home' : pA > pH ? 'away' : 'draw';

  // ── CAS MATCH NUL OFFICIEL (score égal à 90', qualifié via TAB) ──
  if (offW90 === 'draw') {
    const exactScore = (pH === oH && pA === oA);
    const goodTab    = (pq !== null && oq !== null && pq === oq);
    if (exactScore && goodTab)  return {p:4, l:'Nul exact + bon TAB !'};
    if (exactScore)             return {p:3, l:'Score exact !'};
    if (goodTab)                return {p:2, l:'Nul + bon TAB'};
    if (proW90 === 'draw')      return {p:1, l:'Résultat nul trouvé'};
    return {p:0, l:'Raté'};
  }

  // ── CAS VICTOIRE NETTE ──
  if (pH === oH && pA === oA)               return {p:3, l:'Score exact !'};
  if (proW90 !== offW90)                    return {p:0, l:'Raté'};
  if (Math.abs(pH-pA) === Math.abs(oH-oA)) return {p:2, l:'Bonne différence !'};
  return {p:1, l:'Bon vainqueur'};
}

function totals(pid) {
  let t=0,tab=0,ex=0,g2=0,g=0;
  ALL_M().forEach(m => {
    const off = S.official[m.id];
    if (!off || off.home === undefined || off.home === '' || off.home === null) return;
    const r = calcPts(S.pronostics[m.id]?.[pid], off);
    if (r) {
      t += r.p;
      if (r.p===4) tab++;
      else if (r.p===3) ex++;
      else if (r.p===2) g2++;
      else if (r.p===1) g++;
    }
  });
  return {t,tab,ex,g2,g};
}

function countP(pid) {
  return ALL_M().filter(m => {
    const p = S.pronostics[m.id]?.[pid];
    return p && p.home !== undefined && p.home !== '';
  }).length;
}

  `);

function doImport() {
  const code = (document.getElementById('impCode')?.value || '').trim();
  if (!code) { toast('Colle un code valide', 'err'); return; }
  try {
    const payload = JSON.parse(decodeURIComponent(escape(atob(code))));
    if (!payload.v || !payload.pid || !payload.name) throw new Error();
    const pid = payload.pid;
    S.players[pid] = payload.name;
    ALL_M().forEach(m => {
      if (payload.pronostics[m.id]) {
        if (!S.pronostics[m.id]) S.pronostics[m.id] = {};
        S.pronostics[m.id][pid] = payload.pronostics[m.id];
      }
    });
    for (const [mid, off] of Object.entries(payload.official || {})) {
      const ex = S.official[mid];
      if (!ex || (payload.ts || 0) > (ex._ts || 0)) S.official[mid] = {...off, _ts: payload.ts};
    }
    save();
    if (S.binId) pushToBin();
    closeModal();
    renderMain();
    toast(`Pronostics de ${payload.name} importés !`, 'ok');
  } catch(e) {
    document.getElementById('impErr').textContent = '❌ Code invalide — vérifie que tu as tout copié';
  }
}

      toast('Synchronisation réseau indisponible — mode local', 'info');

function renderCard(m) {
  const hf = gf(m.h), af = gf(m.a);
  const isTBD = m.h.startsWith('Vainqueur') || m.a.startsWith('Vainqueur');
  const p1p = S.pronostics[m.id]?.p1 || {};
  const p2p = S.pronostics[m.id]?.p2 || {};
  const off = S.official[m.id] || {};
  const hasOff = off.home !== undefined && off.home !== '' && off.home !== null;
  const r1 = hasOff ? calcPts(p1p, off) : null;
  const r2 = hasOff ? calcPts(p2p, off) : null;
  const hp1 = p1p.home !== undefined && p1p.home !== '';
  const hp2 = p2p.home !== undefined && p2p.home !== '';

  let cls='', sl='En attente', stc='var(--t3)', stb='rgba(255,255,255,.05)';
  if (hasOff)       { cls=' done';  sl='✅ Terminé';      stc='var(--grl)'; stb='rgba(39,174,96,.15)'; }
  else if(hp1&&hp2) { cls=' prono'; sl='🎯 Pronostiqué';  stc='var(--g)';   stb='rgba(201,162,39,.15)'; }
  else if(hp1||hp2) { cls=' prono'; sl='⏳ Partiel';      stc='var(--gl)';  stb='rgba(201,162,39,.1)'; }

  const pBlock = (pid, prono, res, color) => {
    const can = S.player === pid;
    const dis = isTBD || !can;
    const pn = esc(S.players[pid] || pid);
    let badge = '';
    if (res != null) {
      const bc = res.p===4?'rgba(155,89,182,.25)':res.p===3?'rgba(201,162,39,.18)':res.p===2?'rgba(52,152,219,.18)':res.p===1?'rgba(39,174,96,.18)':'rgba(255,255,255,.06)';
      const tc = res.p===4?'#C39BD3':res.p===3?'var(--gl)':res.p===2?'#5DADE2':res.p===1?'var(--grl)':'var(--t3)';
      badge = `<span class="ptb" style="background:${bc};color:${tc}">${res.p}pt${res.p!==1?'s':''} ${res.l}</span>`;
    }
    const qh = m.h.replace(/'/g,"\\'"), qa = m.a.replace(/'/g,"\\'");
    const qbtns = isTBD ? '' : `
      <span class="ql">🥅 Vainqueur aux tirs au but :</span>
      <div class="qo">
        <button class="qb" style="border:1px solid ${(prono.q||null)===m.h?'var(--g)':'var(--b2)'};background:${(prono.q||null)===m.h?'rgba(201,162,39,.14)':'rgba(255,255,255,.04)'};color:${(prono.q||null)===m.h?'var(--gl)':'var(--t2)'}"
          ${dis?'disabled':''} onclick="setQ('${m.id}','${pid}','${qh}')">${hf} ${esc(m.h.split(' ')[0])}</button>
        <button class="qb" style="border:1px solid ${(prono.q||null)===m.a?'var(--g)':'var(--b2)'};background:${(prono.q||null)===m.a?'rgba(201,162,39,.14)':'rgba(255,255,255,.04)'};color:${(prono.q||null)===m.a?'var(--gl)':'var(--t2)'}"
          ${dis?'disabled':''} onclick="setQ('${m.id}','${pid}','${qa}')">${af} ${esc(m.a.split(' ')[0])}</button>
      </div>`;
    return `<div class="pb" style="border-left:3px solid ${color};opacity:${can?1:.65}">
      <div class="pt"><span class="pn">${pn}</span>${badge}</div>
      <div class="sr">
        <input type="number" inputmode="numeric" enterkeyhint="done" min="0" max="99" class="si" ${dis?'disabled':''} value="${prono.home!==undefined&&prono.home!==''?prono.home:''}" placeholder="–"
          oninput="setScore('${m.id}','${pid}','home',this.value)">
        <span class="ss">–</span>
        <input type="number" inputmode="numeric" enterkeyhint="done" min="0" max="99" class="si" ${dis?'disabled':''} value="${prono.away!==undefined&&prono.away!==''?prono.away:''}" placeholder="–"
          oninput="setScore('${m.id}','${pid}','away',this.value)">
      </div>
      ${qbtns}
    </div>`;
  };

  const oqBtns = isTBD ? '' : `
    <div class="oqr">
      <button class="oqb" style="border:1px solid ${(off.q||null)===m.h?'rgba(39,174,96,.6)':'rgba(39,174,96,.2)'};background:${(off.q||null)===m.h?'rgba(39,174,96,.2)':'rgba(39,174,96,.06)'};color:${(off.q||null)===m.h?'var(--grl)':'var(--t2)'}"
        onclick="setOffQ('${m.id}','${m.h.replace(/'/g,"\\'")}')">
        ${hf} ${esc(m.h.split(' ')[0])} qualifié</button>
      <button class="oqb" style="border:1px solid ${(off.q||null)===m.a?'rgba(39,174,96,.6)':'rgba(39,174,96,.2)'};background:${(off.q||null)===m.a?'rgba(39,174,96,.2)':'rgba(39,174,96,.06)'};color:${(off.q||null)===m.a?'var(--grl)':'var(--t2)'}"
        onclick="setOffQ('${m.id}','${m.a.replace(/'/g,"\\'")}')">
        ${af} ${esc(m.a.split(' ')[0])} qualifié</button>
      <button class="oqb" style="border:1px solid ${!off.q?'rgba(39,174,96,.6)':'rgba(39,174,96,.2)'};background:${!off.q?'rgba(39,174,96,.2)':'rgba(39,174,96,.06)'};color:${!off.q?'var(--grl)':'var(--t2)'}"
        onclick="setOffQ('${m.id}','')">Victoire nette</button>
    </div>`;

  return `<div class="mc${cls}" id="mc_${m.id}">
    <div class="mc-hdr">
      <span class="mc-num">${m.n}</span>
      <span class="mc-info">📅 ${m.d}</span>
      <span class="mc-st" style="background:${stb};color:${stc}">${sl}</span>
    </div>
    <div class="mc-body">
      <div class="trow">
        <div class="tl"><span class="tf">${hf}</span><div class="tn">${esc(m.h)}</div></div>
        <span class="vs">${hasOff?`<span style="color:var(--grl);font-size:18px;font-weight:700">${off.home}–${off.away}</span>`:'VS'}</span>
        <div class="tr"><span class="tf">${af}</span><div class="tn">${esc(m.a)}</div></div>
      </div>
      <div class="pg">
        ${pBlock('p1',p1p,r1,'var(--g)')}
        ${pBlock('p2',p2p,r2,'var(--r)')}
      </div>
      <div class="os">
        <div class="ol">⚽ Score officiel${off._auto?' <span style="font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(82,213,126,.15);color:var(--grl)">🤖 Auto</span>':''}</div>
        <div class="or">
          <span style="font-size:20px">${hf}</span>
          <input type="number" inputmode="numeric" enterkeyhint="done" min="0" max="99" class="oi${off._auto?' auto':''}" value="${hasOff?off.home:''}" placeholder="–"
            oninput="setOff('${m.id}','home',this.value)">
          <span style="font-size:16px;font-weight:700;color:var(--t3)">–</span>
          <input type="number" inputmode="numeric" enterkeyhint="done" min="0" max="99" class="oi${off._auto?' auto':''}" value="${hasOff&&off.away!==undefined?off.away:''}" placeholder="–"
            oninput="setOff('${m.id}','away',this.value)">
          <span style="font-size:20px">${af}</span>
        </div>
        ${oqBtns}
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════
// ACTIONS UI
// ══════════════════════════════════════════════════════════════
function setRound(r) { ROUND=r; renderMain(); }
function setSearch(v) { SEARCH=v; renderMain(); }

function setScore(mid, pid, side, val) {
  if (!S.pronostics[mid]) S.pronostics[mid] = {};
  if (!S.pronostics[mid][pid]) S.pronostics[mid][pid] = {};
  const parsed = val === '' ? '' : parseInt(val);
  if (isNaN(parsed) && val !== '') return; // Ignorer les valeurs non-entières
  S.pronostics[mid][pid][side] = parsed;
  save();
  pushToBin();
  refreshCard(mid);
  // Ne pas appeler updateDash ici — déclenché par focusout/click outside
}

function setQ(mid, pid, team) {
  if (!S.pronostics[mid]) S.pronostics[mid] = {};
  if (!S.pronostics[mid][pid]) S.pronostics[mid][pid] = {};
  S.pronostics[mid][pid].q = S.pronostics[mid][pid].q === team ? null : team;
  save();
  pushToBin();
  refreshCard(mid);
  updateDash(); // Clic bouton = hors input, mise à jour immédiate
}

function setOff(mid, side, val) {
  if (!S.official[mid]) S.official[mid] = {};
  S.official[mid][side] = val === '' ? '' : parseInt(val);
  S.official[mid]._auto = false;
  S.official[mid]._ts = Date.now();
  save();
  pushToBin();
  refreshCard(mid);
  updateDash(); // Mettre à jour le tableau de bord immédiatement
}

function setOffQ(mid, team) {
  if (!S.official[mid]) S.official[mid] = {};
  S.official[mid].q = team || null;
  save();
  pushToBin();
  refreshCard(mid);
  updateDash();
}

// Met à jour uniquement le tableau de bord sans re-render la page entière
function updateDash() {
  const p1 = totals('p1'), p2 = totals('p2');
  const n1 = esc(S.players.p1), n2 = esc(S.players.p2);
  const dash = document.querySelector('.dash');
  if (!dash) return;
  dash.innerHTML = `
    <div class="dash-card" style="border-left:4px solid var(--g)">
      <div class="dash-name">${n1}${p1.t>=p2.t&&p1.t>0?'<span class="badge">🥇</span>':''}</div>
      <div class="dash-pts" style="color:var(--g)">${p1.t}<span style="font-size:14px;color:var(--t2)"> pts</span></div>
      <div class="dash-stats">
        <div><div class="dash-sn">${countP('p1')}</div><div class="dash-sl">Pronos</div></div>
        ${p1.tab?`<div><div class="dash-sn" style="color:#C39BD3">${p1.tab}</div><div class="dash-sl">TAB</div></div>`:''}
        <div><div class="dash-sn">${p1.ex}</div><div class="dash-sl">Exacts</div></div>
        <div><div class="dash-sn">${p1.g2}</div><div class="dash-sl">Bon diff.</div></div>
        <div><div class="dash-sn">${p1.g}</div><div class="dash-sl">Vainqueur</div></div>
      </div>
    </div>
    <div class="dash-card" style="border-left:4px solid var(--r)">
      <div class="dash-name">${n2}${p2.t>p1.t?'<span class="badge">🥇</span>':''}</div>
      <div class="dash-pts" style="color:var(--r)">${p2.t}<span style="font-size:14px;color:var(--t2)"> pts</span></div>
      <div class="dash-stats">
        <div><div class="dash-sn">${countP('p2')}</div><div class="dash-sl">Pronos</div></div>
        ${p2.tab?`<div><div class="dash-sn" style="color:#C39BD3">${p2.tab}</div><div class="dash-sl">TAB</div></div>`:''}
        <div><div class="dash-sn">${p2.ex}</div><div class="dash-sl">Exacts</div></div>
        <div><div class="dash-sn">${p2.g2}</div><div class="dash-sl">Bon diff.</div></div>
        <div><div class="dash-sn">${p2.g}</div><div class="dash-sl">Vainqueur</div></div>
      </div>
    </div>`;
}

function refreshCard(mid) {
  const el = document.getElementById('mc_'+mid);
  if (!el) return;
  const fm = ALL_M().find(m => m.id === mid);
  if (!fm) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = renderCard(fm);
  el.replaceWith(tmp.firstElementChild);
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
function render() {
  renderHeader();
  if (!INITED) renderSetup();
  else renderMain();
}

// ── GESTION CLAVIER MOBILE ──────────────────────────────────────────────────
// Quand l'utilisateur clique hors d'un champ de saisie → blur + updateDash
document.addEventListener('click', function(e) {
  const tag = e.target.tagName;
  const isInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
  if (!isInput) {
    const active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) {
      active.blur(); // Ferme le clavier
      // Mettre à jour les scores globaux
      if (INITED) updateDash();
    }
  }
}, true);

// Aussi sur le blur de chaque input (quand l'utilisateur appuie sur "Suivant" sur le clavier)
document.addEventListener('focusout', function(e) {
  const tag = e.target.tagName;
  if ((tag === 'INPUT' || tag === 'TEXTAREA') && INITED) {
    setTimeout(updateDash, 50); // léger délai pour laisser la valeur se mettre à jour
  }
}, true);

// ── BLUR GLOBAL : updateDash quand le joueur quitte un champ ───────────────
// blur ne bulle pas => phase capture nécessaire
document.addEventListener('blur', function(e) {
  if (e.target.tagName === 'INPUT' && e.target.type === 'number') {
    setTimeout(updateDash, 50);
  }
}, true);

// Démarrage instantané — zéro attente réseau
const hasSession = load();
if (hasSession && S.name && S.binId) {
  INITED = true;
  render();
  // Sync en arrière-plan, non-bloquant
  setTimeout(async () => {
    startPolling();
    startScoresFetch();
    await pollBin();
  }, 0);
} else {
  render();
}
</script>
</body>
